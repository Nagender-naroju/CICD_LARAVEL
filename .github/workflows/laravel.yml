name: Laravel_CICD
on: ["push", "workflow_dispatch"]
jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout The code
        uses: actions/checkout@v4

      - name: Setup The PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_mysql, bcmath, mbstring, dom, tokenizer, xmlwriter, xmlreader
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Copy The Env
        run: cp .env.example .env

      - name: Install Dependencies
        run: composer install

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Frontend Assets
        run: npm run build

      - name: Generate APP Key
        run: php artisan key:generate

      - name: Create SQLite Database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run Migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate

      - name: Run Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/laravel_cicd:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/laravel_cicd:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/laravel_cicd:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/laravel_cicd:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/laravel_cicd:latest
