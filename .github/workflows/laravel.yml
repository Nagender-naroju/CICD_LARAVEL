name: Laravel_CICD
on: ["push", "workflow_dispatch"]

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout The code
        uses: actions/checkout@v4

      - name: Setup The PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_mysql, bcmath, mbstring, dom, tokenizer, xmlwriter, xmlreader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Copy The Env
        run: cp .env.example .env

      - name: Install Dependencies
        run: composer install

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Frontend Assets
        run: npm run build

      - name: Generate APP Key
        run: php artisan key:generate

      - name: Create SQLite Database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run Migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate

      - name: Run Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/laravel_cicd:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/laravel_cicd:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/laravel_cicd:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/laravel_cicd:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/laravel_cicd:latest

  Deploy:
    runs-on: ubuntu-latest
    needs: Build

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/html

            # Pull latest code
            sudo git pull origin main

            # Pull latest app image from Docker Hub
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/laravel_cicd:latest

            # Update the app image tag in compose to use latest
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            # Bring down existing containers (keep mysql volume intact)
            sudo docker compose down --remove-orphans

            # Start all services fresh
            sudo docker compose up -d

            # Wait for MySQL to be ready
            sleep 15

            # Run migrations inside app container
            sudo docker compose exec -T app php artisan migrate --force

            # Clear and rebuild caches inside container
            sudo docker compose exec -T app php artisan config:clear
            sudo docker compose exec -T app php artisan config:cache
            sudo docker compose exec -T app php artisan route:cache
            sudo docker compose exec -T app php artisan view:cache

            # Show running containers
            sudo docker compose ps
